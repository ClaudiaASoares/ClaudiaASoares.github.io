name: Update publications

on:
  workflow_dispatch:
  schedule:
    - cron: "0 7 * * 1"

permissions:
  contents: write
  pull-requests: write

jobs:
  update-publications:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: requirements-publications.txt

      - name: Install publication dependencies
        run: python -m pip install -r requirements-publications.txt

      - name: Update BibTeX from ORCID and OpenAlex
        run: python scripts/update_publications_bib.py --verbose

      - name: Regenerate publication pages
        run: python pubsFromBib.py
        working-directory: markdown_generator

      - name: Create publication update pull request
        uses: peter-evans/create-pull-request@v8
        with:
          branch: codex/update-publications
          delete-branch: true
          title: Update publications
          commit-message: Update publications
          body: |
            Automated publication update from ORCID, OpenAlex, and DOI metadata.

            Review the generated BibTeX and publication pages before merging.
